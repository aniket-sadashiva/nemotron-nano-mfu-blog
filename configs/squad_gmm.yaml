# SQuAD fine-tune with gmm_patch. 100 steps.
# Paired with squad_baseline.yaml - configs are identical EXCEPT:
#   - this file has `parallelizer:` section pointing at gmm_patch
#   - this file has `defer_fsdp_grad_sync` unset (default false)
# Launch: bash scripts/run_squad_gmm.sh
#
# Purpose: verify the gmm_patch is a functional no-op by showing its
# validation loss curve matches the baseline's within step-to-step noise.

seed: 42

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 10
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

parallelizer:
  _target_: gmm_patch.parallelize_nemotronh_gmm
  activation_checkpointing: true
  reshard_after_forward: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  torch_dtype: bf16
  trust_remote_code: true
  force_hf: true
  attn_implementation: eager

# Checkpoint dir is where training.jsonl / validation.jsonl land.
# Path is container-side; run script binds ./results/ to /workspace/results/.
checkpoint:
  # We don't persist weights — this run is only for the validation loss curve,
  # which is written to {checkpoint_dir}/validation.jsonl regardless of enabled.
  enabled: false
  checkpoint_dir: /workspace/results/squad_gmm/
  model_save_format: torch_save
  save_consolidated: false
  load_base_model: false

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  dp_size: none
  dp_replicate_size: 1
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
  use_hf_tp_plan: false

compile:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: True

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 256

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1.0e-8
  lr: 1.0e-5
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6
